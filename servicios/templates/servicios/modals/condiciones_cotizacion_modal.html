<div id="modalCondicionesCotizacion" class="hidden fixed inset-0 z-[100] bg-slate-950/70 backdrop-blur-md transition-opacity duration-300">
    <div class="w-screen h-screen flex items-center justify-center p-4 md:p-6">
        <div id="modalCondicionesDialog" class="relative w-full max-w-6xl max-h-[88vh] bg-white rounded-[2rem] border border-slate-200 shadow-[0_30px_100px_rgba(15,23,42,0.35)] overflow-hidden flex flex-col">

            <div class="shrink-0 px-6 md:px-8 py-5 border-b border-slate-100 bg-white">
                <div class="flex items-start justify-between gap-4">
                    <div class="flex items-center gap-4 min-w-0">
                        <div class="w-12 h-12 rounded-2xl bg-emerald-600 text-white flex items-center justify-center shadow-lg shadow-emerald-200 shrink-0">
                            <i data-lucide="file-cog" class="w-5 h-5"></i>
                        </div>
                        <div class="min-w-0">
                            <h3 class="text-base md:text-lg font-black text-slate-900 uppercase tracking-tight">
                                Contenido de la oferta
                            </h3>
                            <p class="text-sm text-slate-500 font-medium">
                                Selecciona y personaliza los textos que se incluirán en esta cotización.
                            </p>
                        </div>
                    </div>

                    <button type="button"
                            onclick="cerrarModalCondicionesCotizacion()"
                            class="w-10 h-10 rounded-xl border border-slate-200 bg-white text-slate-400 hover:text-rose-600 hover:border-rose-200 hover:bg-rose-50 transition-all flex items-center justify-center shrink-0">
                        <i data-lucide="x" class="w-4 h-4"></i>
                    </button>
                </div>
            </div>

            <div class="shrink-0 px-6 md:px-8 py-4 border-b border-slate-100 bg-slate-50/70 flex flex-col xl:flex-row gap-3 xl:items-center xl:justify-between">
                <div class="flex flex-wrap items-center gap-2">
                    <button type="button"
                            onclick="seleccionarTodoCondiciones()"
                            class="px-4 py-2 rounded-xl bg-white border border-slate-200 text-slate-700 text-[11px] font-black uppercase hover:border-emerald-500 hover:text-emerald-600 transition-all">
                        Seleccionar todo
                    </button>

                    <button type="button"
                            onclick="limpiarTodoCondiciones()"
                            class="px-4 py-2 rounded-xl bg-white border border-slate-200 text-slate-700 text-[11px] font-black uppercase hover:border-rose-500 hover:text-rose-600 transition-all">
                        Limpiar
                    </button>

                    <button type="button"
                            onclick="cargarCondicionesDesdeDataLocal()"
                            class="px-4 py-2 rounded-xl bg-white border border-slate-200 text-slate-700 text-[11px] font-black uppercase hover:bg-slate-100 transition-all">
                        Restaurar
                    </button>
                </div>

                <div id="condiciones-modal-meta" class="inline-flex items-center gap-2 px-3 py-2 rounded-full bg-slate-100 text-[10px] font-black text-slate-600 uppercase tracking-widest">
                    <span class="w-2 h-2 rounded-full bg-emerald-500"></span>
                    Configuración local
                </div>
            </div>

            <div id="modalCondicionesBodyWrap" class="flex-1 overflow-y-auto bg-slate-50/40">
                <div id="condiciones-modal-body" class="p-6 md:p-8 space-y-4">
                    <div class="rounded-2xl border border-slate-200 bg-white px-5 py-6 text-sm font-semibold text-slate-500">
                        Cargando condiciones...
                    </div>
                </div>
            </div>

            <div class="shrink-0 px-6 md:px-8 py-5 border-t border-slate-100 bg-white flex flex-col sm:flex-row gap-4 items-center justify-between">
                <p class="text-xs font-semibold text-slate-500 leading-snug">
                    Al aplicar, la selección quedará lista para guardarse junto con la cotización.
                </p>

                <div class="flex gap-3 w-full sm:w-auto">
                    <button type="button"
                            onclick="cerrarModalCondicionesCotizacion()"
                            class="flex-1 sm:flex-none px-6 py-3 rounded-2xl border border-slate-200 bg-white text-slate-600 text-xs font-black uppercase hover:bg-slate-50 transition-all">
                        Cancelar
                    </button>

                    <button type="button"
                            id="btnAplicarCondicionesModal"
                            onclick="aplicarCondicionesAlFormulario()"
                            class="flex-1 sm:flex-none px-8 py-3 rounded-2xl bg-emerald-600 text-white text-xs font-black uppercase shadow-lg shadow-emerald-200 hover:bg-emerald-700 transition-all flex items-center justify-center gap-2">
                        <i data-lucide="check-check" class="w-4 h-4"></i>
                        Aplicar cambios
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
