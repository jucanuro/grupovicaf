{% extends 'base_vicafpro.html' %}
{% load static %}

{% block title %}Calendario Vicaf Lab | Profesional{% endblock %}

{% block extra_head %}
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
    <style>
        /* Estilos optimizados para una integración limpia */
        .g-container { display: flex; height: calc(100vh - 80px); background: #fff; }
        .g-sidebar { width: 280px; border-right: 1px solid #dadce0; padding: 20px; }
        .g-main { flex: 1; padding: 10px; overflow: hidden; }
        
        /* Personalización Fina */
        .fc .fc-toolbar-title { font-weight: 500 !important; color: #202124 !important; }
        .event-vicaf { background-color: #1a73e8 !important; border-color: #1a73e8 !important; color: white !important; }
        
        /* Botón Crear Flotante */
        .btn-fab { 
            background: #fff; border: 1px solid #dadce0; padding: 12px 24px; 
            border-radius: 50px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            display: flex; align-items: center; gap: 10px; font-weight: 500; cursor: pointer;
        }
    </style>
{% endblock %}

{% block content %}
<div class="g-container">
    <aside class="g-sidebar">
        <button class="btn-fab mb-8"><i class="ph ph-plus"></i> Crear Ensayo</button>
        <div id="mini-calendar" class="text-sm"></div>
    </aside>

    <main class="g-main">
        <div id="calendar"></div>
    </main>
</div>
{% endblock %}

{% block extra_js %}
<script>
    document.addEventListener('DOMContentLoaded', function() {
        const calendarEl = document.getElementById('calendar');
        const calendar = new FullCalendar.Calendar(calendarEl, {
            initialView: 'dayGridMonth',
            locale: 'es',
            headerToolbar: {
                left: 'prev,next today',
                center: 'title',
                right: 'dayGridMonth,timeGridWeek,timeGridDay'
            },
            // Conexión con tu API profesional
            events: '/api/eventos/', 
            editable: true,
            selectable: true,
            navLinks: true,
            nowIndicator: true,
            eventClick: function(info) {
                // Aquí abres un Modal para editar el ensayo
                alert('Detalle: ' + info.event.title);
            }
        });
        calendar.render();
    });
</script>
{% endblock %}
