{% extends "base_vicafpro.html" %}
{% load static %}

{% block content %}
<style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@400;500&display=swap');
    
    body { 
        font-family: 'Inter', sans-serif; 
        background-color: #f8fafc;
    }

    /* Fondo Engine Unificado */
    .bg-vicaf-engine {
        position: fixed; inset: 0; z-index: -1; background-color: #f8fafc;
        background-image: linear-gradient(rgba(226, 232, 240, 0.5) 1px, transparent 1px), linear-gradient(90deg, rgba(226, 232, 240, 0.5) 1px, transparent 1px);
        background-size: 40px 40px;
    }

    .animated-gradient-text {
        background: linear-gradient(to right, #10B981, #3B82F6, #8B5CF6);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        text-fill-color: transparent;
        background-size: 200% auto;
        animation: text-gradient 3s linear infinite alternate;
    }

    @keyframes text-gradient {
        to { background-position: 200% center; }
    }

    /* Animaciones */
    @keyframes slideInUp {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .animate-slide-in-up {
        animation: slideInUp 0.6s ease-out forwards;
    }

    /* Input Estilo Engine */
    .form-input-engine {
        background-color: #f1f5f9;
        border: 1px solid transparent;
        transition: all 0.2s ease-in-out;
    }
    .form-input-engine:focus {
        background-color: #ffffff;
        border-color: #4f46e5;
        box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
    }
</style>

<div class="bg-vicaf-engine"></div>

<div id="projects-list-view" class="max-w-full mx-auto p-4 relative z-10 space-y-4 flex flex-col animate-slide-in-up">
    <div class="command-header" data-command-header>
        <div class="command-header__backdrop" data-command-backdrop></div>

        <div class="command-header__toolbar">
            <button type="button"
                    class="command-header__trigger"
                    data-command-toggle
                    aria-label="Abrir panel de proyectos pendientes">
                <i data-lucide="panel-top-open" class="w-4 h-4"></i>
                <span class="command-header__trigger-label">Panel</span>
            </button>

            <a href="{% url 'dashboard' %}"
            class="command-header__action command-header__action--secondary">
                <i data-lucide="layout-dashboard" class="w-3.5 h-3.5"></i>
                Dashboard
            </a>
        </div>

        <div class="command-header__panel" data-command-panel>
            <div class="command-header__card relative px-5 py-4 sm:px-6 sm:py-4">
                <div class="command-header__glow"></div>

                <div class="relative flex flex-col gap-4">
                    <div class="flex items-start justify-between gap-4">
                        <div class="flex items-center gap-4 min-w-0">
                            <div class="w-12 h-12 bg-slate-900 rounded-xl flex items-center justify-center text-white shadow-md flex-shrink-0">
                                <i data-lucide="clipboard-list" class="w-6 h-6"></i>
                            </div>

                            <div class="command-header__title-wrap">
                                <h1 class="command-header__title truncate">
                                    Proyectos Pendientes
                                </h1>
                                <p class="command-header__subtitle truncate">
                                    Gestión de Muestras && Control de Ensayos
                                </p>
                            </div>
                        </div>

                        <button type="button"
                                class="command-header__close"
                                data-command-close
                                aria-label="Cerrar panel">
                            <i data-lucide="x" class="w-4 h-4"></i>
                        </button>
                    </div>

                    <div class="command-header__search max-w-md">
                        <i data-lucide="search" class="w-4 h-4 text-slate-400 mr-2"></i>
                        <input type="text"
                            id="search-input"
                            class="bg-transparent border-none outline-none text-xs font-semibold text-slate-700 w-full"
                            placeholder="BUSCAR POR CLIENTE O PROYECTO...">
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <div class="w-full">
        {% include 'proyectos/includes/lista_proyectos.html' %}
    </div>
</div>

<div id="samples-view" style="display: none;">
    </div>

{% endblock %}

{% block extra_scripts %}
<script src="https://unpkg.com/lucide@latest"></script>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        if (typeof lucide !== 'undefined') {
            lucide.createIcons();
        }
    });
</script>
<script src="{% static 'js/projects_list.js' %}"></script>
{% endblock %}
