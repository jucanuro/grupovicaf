<div id="tipoMuestraModal" class="fixed inset-0 z-[999999] hidden items-center justify-center bg-slate-900/60 backdrop-blur-sm p-4">
    <div id="tipoMuestraModalPanel" class="w-full max-w-lg rounded-2xl bg-white shadow-2xl border border-slate-200 overflow-hidden">
        
        <div class="flex items-center justify-between px-6 py-4 border-b border-slate-200 bg-slate-50">
            <h3 class="text-sm font-black text-slate-800 uppercase tracking-widest">
                Nuevo Tipo de Muestra
            </h3>
            <button type="button" data-close-tipo-muestra-modal class="text-slate-500 hover:text-red-500">
                <i data-lucide="x" class="w-5 h-5"></i>
            </button>
        </div>

        <form id="form-tipo-muestra" class="p-6 space-y-4">
            <div>
                <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">Nombre</label>
                <input
                    type="text"
                    id="tipo_muestra_nombre"
                    name="nombre"
                    required
                    minlength="2"
                    maxlength="100"
                    class="w-full px-4 py-3 rounded-xl border border-slate-200 bg-white text-xs font-semibold text-slate-700"
                    placeholder="Ej: Suelo natural">
            </div>

            <div>
                <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">Sigla</label>
                <input
                    type="text"
                    id="tipo_muestra_sigla"
                    name="sigla"
                    required
                    minlength="1"
                    maxlength="10"
                    class="w-full px-4 py-3 rounded-xl border border-slate-200 bg-white text-xs font-semibold text-slate-700 uppercase"
                    placeholder="Ej: SN">
            </div>

            <div id="tipo-muestra-modal-message" class="hidden rounded-xl border px-4 py-3 text-xs font-bold"></div>

            <div class="flex justify-end gap-3 pt-2">
                <button
                    type="button"
                    data-close-tipo-muestra-modal
                    class="px-4 py-2.5 rounded-xl border border-slate-200 bg-white text-slate-700 text-xs font-black uppercase">
                    Cancelar
                </button>

                <button
                    type="submit"
                    id="btn-submit-tipo-muestra"
                    class="px-5 py-2.5 rounded-xl bg-slate-900 text-white text-xs font-black uppercase hover:bg-blue-600 transition-all">
                    Guardar
                </button>
            </div>
        </form>
    </div>
</div>
