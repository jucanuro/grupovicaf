{% extends 'base_vicafpro.html' %}

{% block content %}
<div class="min-h-screen bg-slate-50 px-6 py-10">
    <div class="max-w-xl mx-auto bg-white rounded-[2rem] border border-slate-200 shadow-xl p-8">
        <div class="w-14 h-14 rounded-2xl bg-rose-50 text-rose-600 flex items-center justify-center mb-5">
            <i data-lucide="trash-2" class="w-6 h-6"></i>
        </div>

        <h1 class="text-2xl font-black text-slate-900">
            Eliminar permiso
        </h1>

        <p class="text-sm text-slate-500 mt-3">
            ¿Estás seguro de eliminar el permiso
            <strong class="text-slate-800">{{ permiso.nombre }}</strong>?
        </p>

        <form method="post" class="flex justify-end gap-3 mt-8">
            {% csrf_token %}

            <a href="{% url 'trabajadores:lista_permisos' %}"
               class="px-5 py-3 rounded-2xl bg-slate-100 text-slate-600 text-sm font-bold">
                Cancelar
            </a>

            <button type="submit"
                    class="px-5 py-3 rounded-2xl bg-rose-600 text-white text-sm font-black">
                Sí, eliminar
            </button>
        </form>
    </div>
</div>
{% endblock %}
